quarkus:
  http:
    host: 0.0.0.0
    port: 8080
    record-request-start-time: true
    access-log:
      enabled: true
      pattern: '%r %s %D ms'
  datasource:
    db-kind: sqlite
    jdbc:
      url: jdbc:sqlite:${MUSIC_VAULT_DB_PATH:/app/data/music-vault.db}
  hibernate-orm:
    database:
      generation: none
    dialect: org.hibernate.community.dialect.SQLiteDialect
  flyway:
    migrate-at-start: true
  swagger-ui:
    always-include: true
  smallrye-openapi:
    info-title: Xingyu Music Vault API
    info-version: 1.3.0
    info-description: Self-hosted music metadata management API.
  log:
    category:
      "com.xingyu.musicvault":
        level: INFO

music-vault:
  data-dir: ${MUSIC_VAULT_DATA_DIR:/app/data}
  config-dir: ${MUSIC_VAULT_CONFIG_DIR:/app/config}
  music-dirs: ${MUSIC_VAULT_MUSIC_DIRS:/music}
  lyric-dirs: ${MUSIC_VAULT_LYRIC_DIRS:/lyrics}
  alignment-jobs-dir: ${MUSIC_VAULT_ALIGNMENT_JOBS_DIR:/alignment-jobs}
  alignment-worker-music-dir: ${MUSIC_VAULT_ALIGNMENT_WORKER_MUSIC_DIR:/music}
  alignment-worker-jobs-dir: ${MUSIC_VAULT_ALIGNMENT_WORKER_JOBS_DIR:/jobs}
  alignment-assets-dir: ${MUSIC_VAULT_ALIGNMENT_ASSETS_DIR:/app/data/alignment-lyrics}
  alignment-status-sync-interval-seconds: ${ALIGNMENT_STATUS_SYNC_INTERVAL_SECONDS:5}
  alignment-status-sync-interval: ${ALIGNMENT_STATUS_SYNC_INTERVAL_SECONDS:5}s
  db-path: ${MUSIC_VAULT_DB_PATH:/app/data/music-vault.db}
  api-token: ${MUSIC_VAULT_API_TOKEN:change-me}
  ffprobe-path: ${MUSIC_VAULT_FFPROBE_PATH:/usr/bin/ffprobe}
  ffmpeg-path: ${MUSIC_VAULT_FFMPEG_PATH:/usr/bin/ffmpeg}

music:
  scan:
    default-path: ${MUSIC_SCAN_DEFAULT_PATH:/music}

app:
  artwork:
    scan-dir: ${APP_ARTWORK_SCAN_DIR:/artwork}

xingyu:
  admin:
    auth:
      cookie:
        secure: ${XINGYU_ADMIN_COOKIE_SECURE:false}
        same-site: ${XINGYU_ADMIN_COOKIE_SAME_SITE:Lax}
      session:
        ttl-minutes: ${XINGYU_ADMIN_SESSION_TTL_MINUTES:1440}
      test-legacy-token:
        enabled: ${XINGYU_ADMIN_TEST_LEGACY_TOKEN_ENABLED:false}
  openapi:
    auth:
      enabled: ${XINGYU_OPENAPI_AUTH_ENABLED:false}
      token: ${XINGYU_OPENAPI_AUTH_TOKEN:}
    credential:
      master-key: ${XINGYU_OPENAPI_CREDENTIAL_MASTER_KEY:}
    hmac:
      timestamp-window-seconds: ${XINGYU_OPENAPI_HMAC_TIMESTAMP_WINDOW_SECONDS:300}
      nonce-ttl-seconds: ${XINGYU_OPENAPI_HMAC_NONCE_TTL_SECONDS:600}
      max-body-bytes: ${XINGYU_OPENAPI_HMAC_MAX_BODY_BYTES:1048576}
    rate-limit:
      enabled: ${XINGYU_OPENAPI_RATE_LIMIT_ENABLED:false}
      requests-per-minute: ${XINGYU_OPENAPI_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
    access-log:
      enabled: ${XINGYU_OPENAPI_ACCESS_LOG_ENABLED:true}

"%dev":
  quarkus:
    datasource:
      jdbc:
        url: jdbc:sqlite:data/music-vault.db
    log:
      category:
        "com.xingyu.musicvault":
          level: DEBUG
  music-vault:
    data-dir: data
    config-dir: config
    music-dirs: ${MUSIC_VAULT_MUSIC_DIRS:music}
    lyric-dirs: ${MUSIC_VAULT_LYRIC_DIRS:lyrics}
    alignment-jobs-dir: ${MUSIC_VAULT_ALIGNMENT_JOBS_DIR:alignment-jobs}
    alignment-worker-music-dir: ${MUSIC_VAULT_ALIGNMENT_WORKER_MUSIC_DIR:music}
    alignment-worker-jobs-dir: ${MUSIC_VAULT_ALIGNMENT_WORKER_JOBS_DIR:alignment-jobs}
    alignment-assets-dir: ${MUSIC_VAULT_ALIGNMENT_ASSETS_DIR:data/alignment-lyrics}
    alignment-status-sync-interval-seconds: ${ALIGNMENT_STATUS_SYNC_INTERVAL_SECONDS:5}
    alignment-status-sync-interval: ${ALIGNMENT_STATUS_SYNC_INTERVAL_SECONDS:5}s
    db-path: data/music-vault.db
  music:
    scan:
      default-path: ${MUSIC_SCAN_DEFAULT_PATH:music}
  app:
    artwork:
      scan-dir: ${APP_ARTWORK_SCAN_DIR:artwork}
  xingyu:
    openapi:
      credential:
        master-key: local-openapi-credential-master-key

"%test":
  quarkus:
    datasource:
      jdbc:
        url: jdbc:sqlite:target/test-music-vault.db
    flyway:
      clean-at-start: true
      clean-disabled: false
  music-vault:
    data-dir: target/test-data
    config-dir: target/test-config
    music-dirs: target/test-music
    lyric-dirs: target/test-music
    alignment-jobs-dir: target/test-alignment-jobs
    alignment-worker-music-dir: /worker/music
    alignment-worker-jobs-dir: /jobs
    alignment-assets-dir: target/test-alignment-assets
    alignment-status-sync-interval-seconds: 3600
    alignment-status-sync-interval: 3600s
    db-path: target/test-music-vault.db
  app:
    artwork:
      scan-dir: target/test-music/artworks
  xingyu:
    admin:
      auth:
        test-legacy-token:
          enabled: true
    openapi:
      credential:
        master-key: test-openapi-credential-master-key
