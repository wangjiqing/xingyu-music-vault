services:
  xingyu-music-vault:
    # Default registry: GHCR.
    # Docker Hub alternative:
    image: wangjiqing/xingyu-music-vault:${IMAGE_TAG:-v1.1.4}
    container_name: xingyu-music-vault
    ports:
      # 安全提示：当前端口映射适合本机 / 局域网调试，不建议直接映射公网。
      # v1.1.4 推荐通过 HTTPS 反向代理访问，容器内部端口仍为 8080。
      - "${APP_PORT:-18081}:8080"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${CONFIG_DIR:-./config}:/app/config
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${MUSIC_DIR:-./music}:/music:ro
      - ${LYRICS_DIR:-./lyrics}:/lyrics:ro
      - ${ARTWORK_DIR:-./artwork}:/artwork
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - QUARKUS_HTTP_HOST=0.0.0.0
      - QUARKUS_HTTP_PORT=8080
      - MUSIC_VAULT_DATA_DIR=/app/data
      - MUSIC_VAULT_CONFIG_DIR=/app/config
      - MUSIC_VAULT_MUSIC_DIRS=/music
      - MUSIC_VAULT_LYRIC_DIRS=/lyrics
      - MUSIC_VAULT_DB_PATH=/app/data/music-vault.db
      - MUSIC_SCAN_DEFAULT_PATH=/music
      - APP_ARTWORK_SCAN_DIR=/artwork
      - MUSIC_VAULT_API_TOKEN=${MUSIC_VAULT_API_TOKEN:-change-me}
      - XINGYU_ADMIN_COOKIE_SECURE=${XINGYU_ADMIN_COOKIE_SECURE:-false}
      - XINGYU_ADMIN_COOKIE_SAME_SITE=${XINGYU_ADMIN_COOKIE_SAME_SITE:-Lax}
      - XINGYU_ADMIN_SESSION_TTL_MINUTES=${XINGYU_ADMIN_SESSION_TTL_MINUTES:-1440}
      - XINGYU_ADMIN_TEST_LEGACY_TOKEN_ENABLED=${XINGYU_ADMIN_TEST_LEGACY_TOKEN_ENABLED:-false}
      - MUSIC_VAULT_FFPROBE_PATH=/usr/bin/ffprobe
      - MUSIC_VAULT_FFMPEG_PATH=/usr/bin/ffmpeg
      - XINGYU_OPENAPI_CREDENTIAL_MASTER_KEY=${XINGYU_OPENAPI_CREDENTIAL_MASTER_KEY:-change-me-openapi-master-key}
      - XINGYU_OPENAPI_HMAC_TIMESTAMP_WINDOW_SECONDS=${XINGYU_OPENAPI_HMAC_TIMESTAMP_WINDOW_SECONDS:-300}
      - XINGYU_OPENAPI_HMAC_NONCE_TTL_SECONDS=${XINGYU_OPENAPI_HMAC_NONCE_TTL_SECONDS:-600}
      - XINGYU_OPENAPI_HMAC_MAX_BODY_BYTES=${XINGYU_OPENAPI_HMAC_MAX_BODY_BYTES:-1048576}
      - XINGYU_OPENAPI_AUTH_ENABLED=${XINGYU_OPENAPI_AUTH_ENABLED:-false}
      - XINGYU_OPENAPI_AUTH_TOKEN=${XINGYU_OPENAPI_AUTH_TOKEN:-}
      - XINGYU_OPENAPI_RATE_LIMIT_ENABLED=${XINGYU_OPENAPI_RATE_LIMIT_ENABLED:-false}
      - XINGYU_OPENAPI_RATE_LIMIT_REQUESTS_PER_MINUTE=${XINGYU_OPENAPI_RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      - XINGYU_OPENAPI_ACCESS_LOG_ENABLED=${XINGYU_OPENAPI_ACCESS_LOG_ENABLED:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
